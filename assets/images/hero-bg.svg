<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <!-- PLACEHOLDER hero background — replace with a real concert photo (hero-bg.jpg) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#3a1220"/>
      <stop offset="45%" stop-color="#1c0f16"/>
      <stop offset="100%" stop-color="#0e0d0f"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E1B32" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9E1B32" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- stage light beams -->
  <polygon points="300,0 150,900 550,900" fill="url(#beam)"/>
  <polygon points="800,0 600,900 1000,900" fill="url(#beam)"/>
  <polygon points="1300,0 1050,900 1450,900" fill="url(#beam)"/>
  <!-- faint sound-wave bars along the bottom -->
  <g fill="#9E1B32" opacity="0.25">
    <rect x="120" y="760" width="18" height="90"/>
    <rect x="160" y="720" width="18" height="130"/>
    <rect x="200" y="780" width="18" height="70"/>
    <rect x="240" y="700" width="18" height="150"/>
    <rect x="280" y="750" width="18" height="100"/>
    <rect x="1300" y="750" width="18" height="100"/>
    <rect x="1340" y="700" width="18" height="150"/>
    <rect x="1380" y="780" width="18" height="70"/>
    <rect x="1420" y="720" width="18" height="130"/>
    <rect x="1460" y="760" width="18" height="90"/>
  </g>
</svg>
